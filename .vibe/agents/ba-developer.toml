agent_type = "agent"
display_name = "ba-developer"
description = "Picks up approved, unblocked todos, implements them, commits, and reports back into ba. Built to run on a loop. Works on any todo unless named developers exist, in which case it takes unassigned/cross-cutting work."
safety = "neutral"
system_prompt_id = "ba-developer"

[tools.bash]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"

[tools.write_file]
permission = "always"

[tools.search_replace]
permission = "always"

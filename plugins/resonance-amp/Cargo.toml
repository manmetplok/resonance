[package]
name = "resonance-amp"
version = "0.1.0"
edition = "2021"
description = "A guitar amp simulator CLAP plugin using Neural Amp Modeler models"

[lib]
crate-type = ["cdylib", "lib"]

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", features = ["assert_process_allocs", "standalone"] }
parking_lot = "0.12"
atomic_float = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[package]
name = "resonance-amp"
version = "0.1.0"
edition = "2021"
description = "A guitar amp simulator CLAP plugin using Neural Amp Modeler models"

[lib]
crate-type = ["cdylib", "lib"]

[features]
default = []
ui = ["resonance-plugin/ui"]

[dependencies]
resonance-plugin = { path = "../../resonance-plugin" }
resonance-common = { path = "../../resonance-common" }
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

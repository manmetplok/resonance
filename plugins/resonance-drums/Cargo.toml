[package]
name = "resonance-drums"
version = "0.1.0"
edition = "2021"
description = "A drum sampler instrument CLAP plugin for the Resonance DAW"

[lib]
crate-type = ["cdylib", "lib"]

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git", features = ["assert_process_allocs", "standalone"] }
parking_lot = "0.12"
hound = "3.5"
atomic_float = "1"
